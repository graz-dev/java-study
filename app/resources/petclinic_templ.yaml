---
# Spring Framework PetClinic — single Spring MVC WAR on Tomcat
# Web UI at http://localhost:8081  (NodePort 30081)
apiVersion: v1
kind: Service
metadata:
  name: petclinic
  namespace: microservices-demo
  labels:
    app: petclinic
    app-type: petclinic
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: petclinic
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic
  namespace: microservices-demo
  labels:
    app: petclinic
    app-type: petclinic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: petclinic
  template:
    metadata:
      labels:
        app: petclinic
        app-type: petclinic
    spec:
      nodeSelector:
        node-role: app
      containers:
        - name: petclinic
          image: ghcr.io/graz-dev/spring-petclinic-jdk25:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: OTEL_SERVICE_NAME
              value: "petclinic"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.monitoring:4318"
            - name: OTEL_METRIC_EXPORT_INTERVAL
              value: "5000"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_LOGS_EXPORTER
              value: "none"
            - name: OTEL_TRACES_EXPORTER
              value: "none"
                #  - name: OTEL_INSTRUMENTATION_COMMON_DEFAULT_ENABLED
                #value: "false"
                #- name: OTEL_INSTRUMENTATION_RUNTIME_TELEMETRY_ENABLED
                # value: "true"
                #- name: OTEL_INSTRUMENTATION_SPRING_WEB_ENABLED
                #value: "true"
            - name: JDK_JAVA_OPTIONS
              value: "-Xmx512m"
          resources:
            requests:
              cpu: 1000m
              memory: 2Gi
            limits:
              cpu: 2000m
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /owners/find
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 36
          readinessProbe:
            httpGet:
              path: /owners/find
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /owners/find
              port: 8080
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
