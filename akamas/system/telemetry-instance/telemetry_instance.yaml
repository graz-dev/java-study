kind: telemetry-instance
system: petclinic
name: Prometheus
provider: Prometheus
config:
  address: "kube-prometheus-kube-prome-prometheus.monitoring.svc.cluster.local"
  port: 9090
  duration: 30
  logLevel: DETAILED

