kind: telemetry-instance
system: petclinic
name: Prometheus
provider: Prometheus
config:
  address: "kube-prometheus-kube-prome-prometheus.monitoring.svc.cluster.local"
  port: 9090
  duration: 30
  logLevel: DETAILED

metrics:
# WebApp (OTel - http_server_request_duration_seconds)
- metric: requests_throughput
  datasourceMetric: sum(rate(http_server_request_duration_seconds_count{job="petclinic"}[$DURATION$]))
- metric: requests_response_time_p50
  datasourceMetric: histogram_quantile(0.50, sum by(le) (rate(http_server_request_duration_seconds_bucket{job="petclinic"}[$DURATION$])))*1000
- metric: requests_response_time_p90
  datasourceMetric: histogram_quantile(0.90, sum by(le) (rate(http_server_request_duration_seconds_bucket{job="petclinic"}[$DURATION$])))*1000
- metric: requests_response_time_p99
  datasourceMetric: histogram_quantile(0.99, sum by(le) (rate(http_server_request_duration_seconds_bucket{job="petclinic"}[$DURATION$])))*1000
- metric: requests_response_time_max
  datasourceMetric: histogram_quantile(1.0, sum by(le) (rate(http_server_request_duration_seconds_bucket{job="petclinic"}[$DURATION$])))*1000
- metric: requests_response_time_min
  datasourceMetric: histogram_quantile(0.01, sum by(le) (rate(http_server_request_duration_seconds_bucket{job="petclinic"}[$DURATION$])))*1000

