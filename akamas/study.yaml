kind: study

name: S5-Baseline
system: petclinic
workflow: petclinic-workflow

goal:
  objective: minimize
  function:
    formula: petclinic_webapp.requests_response_time_p90
  constraints:
    relativeToBaseline:
      - name: Throughput
        formula: petclinic_webapp.requests_throughput >= -10%
      - name: Error Rate 
        formula: petclinic_webapp.requests_error_throughput <= +10%
    absolute:
      - name: CPU Util <= 0.8 * CPU Limit petclinic
        formula: petclinic_workload.k8s_workload_cpu_used - (0.8 * petclinic_workload.k8s_workload_cpu_limit) <= 0
      - name: Mem Util <= 0.8 * Mem Request petclinic
        formula: petclinic_workload.k8s_workload_memory_used - (0.8 * petclinic_workload.k8s_workload_memory_request) <= 0
      - name: Allocated Resources
        formula: ((8 * (petclinic_workload.k8s_workload_cpu_allocated)/1000 + (petclinic_workload.k8s_workload_memory_allocated)/1024/1024/1024)) <= 280 
      
windowing:
  type: trim 
  trim: [1m, 5m]
  task: Run Workload

metricsSelection:
  - petclinic_webapp.requests_throughput
  - petclinic_webapp.requests_response_time_max
  - petclinic_webapp.requests_response_time_min
  - petclinic_webapp.requests_response_time_p50
  - petclinic_webapp.requests_response_time_p90
  - petclinic_webapp.requests_response_time_p99
  - petclinic_webapp.requests_error_throughput
  
  # workload
  - petclinic_workload.k8s_workload_desired_pods
  - petclinic_workload.k8s_workload_running_pods
  - petclinic_workload.k8s_workload_cpu_limit
  - petclinic_workload.k8s_workload_cpu_request
  - petclinic_workload.k8s_workload_cpu_used
  - petclinic_workload.k8s_workload_memory_limit
  - petclinic_workload.k8s_workload_memory_request
  - petclinic_workload.k8s_workload_memory_used
  - petclinic_workload.k8s_workload_cpu_allocated
  - petclinic_workload.k8s_workload_memory_allocated
  
  # container
  - petclininc_container.container_cpu_used
  - petclininc_container.container_memory_used
  - petclininc_container.container_cpu_request
  - petclininc_container.container_cpu_limit
  - petclininc_container.container_memory_request
  - petclininc_container.container_memory_limit
  - petclininc_container.container_restarts
  

parametersSelection:
  - name: petclininc_container.cpu_request
    domain: [300, 2000]
  - name: petclininc_container.cpu_limit
    domain: [750, 3000]
  - name: petclininc_container.memory_request
    domain: [1024, 8192]
  - name: petclininc_container.memory_limit
    domain: [4096, 10240]
  - name: petclinic_hpa.targetCPUUtilizationPercentage
    domain: [30, 90]
  - name: petclinic_jvm.jvm_maxHeapSize
    domain: [4096, 10240]
  - name: petclinic_jvm.jvm_gcType
    categories: ["G1", "Parallel", "Serial"]
  - name: petclinic_jvm.jvm_minHeapFreeRatio
    domain: [10, 40]
  - name: petclinic_jvm.jvm_maxHeapFreeRatio
    domain: [20, 70]
  - name: petclinic_jvm.jvm_GCTimeRatio
    domain: [2, 99]
  - name: petclinic_jvm.jvm_tieredCompilationStopAtLevel #(default 4)
    domain: [1, 4]
  - name: petclinic_jvm.jvm_compileThresholdScaling
    domain: [0.5, 5]

  

parameterConstraints:
  - name: CPU req < limit petclinic
    formula: petclininc_container.cpu_request <= petclininc_container.cpu_limit
  - name: Mem request <= Mem limit petclinic
    formula: petclininc_container.memory_request <= petclininc_container.memory_limit
  - name: max heap + offheap <= Mem limit petclinic
    formula: petclinic_jvm.jvm_maxHeapSize + 512 <= petclininc_container.memory_limit
  
steps:
  - name: baseline
    type: baseline
    numberOfTrials: 1
    values:
      petclininc_container.cpu_request: 750
      petclininc_container.cpu_limit: 10000
      petclininc_container.memory_request: 2048
      petclininc_container.memory_limit: 8192
      petclinic_hpa.targetCPUUtilizationPercentage: 50
      petclinic_jvm.jvm_tieredCompilationStopAtLevel: 4