kind: workflow
name: petclinic-workflow
tasks:
  - name: Config values file
    operator: FileConfigurator
    arguments:
      source:
        hostname: toolbox
        username: akamas
        key: /home/akamas/.ssh/id_rsa
        path: /work/code/java-study/akamas/template/template.sh
      target:
        hostname: toolbox
        username: akamas
        key: /home/akamas/.ssh/id_rsa
        path: /work/code/java-study/akamas/template/final.sh
  - name: Apply Config
    operator: Executor
    arguments:
      retries: 0
      timeout: 15m
      host:
        hostname: toolbox
        username: akamas
        key: /home/akamas/.ssh/id_rsa
      command: bash /work/code/java-study/akamas/template/final.sh
  - name: Run Workload
    operator: Executor
    arguments:
      retries: 0
      timeout: 40m
      host:
        hostname: toolbox
        username: akamas
        key: /home/akamas/.ssh/id_rsa
      command: bash /work/code/java-study/akamas/scripts/run-workload.sh
